# Model identity registry — committed schema, no bindings.
#
# This file declares model identities only. Each `[models.X]` entry is a
# bare table with a docstring; the entries here are intentionally empty.
# All provider bindings (claude_code id, codex id, direct_api endpoint,
# api_env, request extras) live in the gitignored `profile/models.toml`
# and merge at runtime: schema from here, bindings from there.
#
# Three orthogonal axes — kept separate by design:
#
#   1. Role            (researcher, reader, scribe, ...)  -> .claude/agents/*.md
#                                                          + harness/agents.toml
#   2. Model identity  (opus, sonnet, deepseek_pro, ...)  -> THIS FILE
#   3. Voices         (which two models a role binds, run in parallel) -> harness/agents.toml
#                                                          (each agent declares
#                                                          its bound `voices`)
#
# Each role declares a `voices` keyed inline table in `harness/agents.toml`
# (`{native = "X", direct = "Y"}`, with leg keys `native`/`direct`/`codex`).
# Whether all declared legs fire on a dispatch is the call site's decision;
# see `protocols/orchestrator.md` -> "Voice Dispatch" for the canonical
# story. Single-leg roles (Scribe) declare only `{native}` by design.
# Tier scales the cardinality of role-units in a gathering (Tier N = N
# parallel copies); tier never alters voices composition.
#
# The "Tier 1-4" review ladder in protocols/orchestrator.md, the evolver,
# and /system-review is the canonical "tier" semantics in this repo.
# It governs how many reviewer-units run on a change. It is NOT a model-
# layer concept.
#
# Per-model schema (binding values live in profile/models.toml):
#   claude_code            Claude Code-side model id (e.g., "opus")
#   codex                  Codex-side model id (e.g., "openai/gpt-5.5")
#   codex_reasoning_effort "high" | "low" — Codex-only reasoning effort
#   direct_api             direct OpenAI-compatible model id
#   direct_api_base        full endpoint URL — host + path
#   direct_api_extras      inline table merged into request body for
#                          provider-specific extensions (e.g., a `thinking`
#                          block for reasoning-control providers)
#   direct_api_timeout     seconds; per-call timeout override (use for
#                          reasoning-heavy models where TTFT exceeds the
#                          120s default)
#   api_env                env var holding the API key (Authorization:
#                          Bearer is assumed)
#
# Helper scripts that read api_env MUST exit-skip cleanly when unset (a
# missing key collapses dual voices to single-leg with a warning, never a
# silent success). Callers that fire dual dispatches MUST handle exit-2
# from chat_completion.py as soft-skip-and-degrade, not as a hard failure.

[models.opus]
# Anthropic Opus — high-cognition Anthropic leg used by deep-thinking roles.

[models.sonnet]
# Anthropic Sonnet — mid-tier Anthropic leg used by cross-validation roles.

[models.haiku]
# Anthropic Haiku — cheap Anthropic leg used by mechanical-capture roles.

[models.deepseek_pro_max]
# DeepSeek v4 Pro with thinking high + extended timeout.

[models.deepseek_pro]
# DeepSeek v4 Pro with default thinking. The reasoning-light DeepSeek leg
# paired with Sonnet on every cross-validation role.

[models.deepseek_flash]
# DeepSeek v4 Flash. The cheap DeepSeek leg paired with Haiku on the
# scribe (mechanical-capture).

[models.codex_gpt55_max]
# Codex gpt-5.5 with reasoning_effort = "high".
