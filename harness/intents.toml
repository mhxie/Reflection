# Portable intent router registry.
#
# Canonical registry of `/hi <context>` intent rules. Each row maps a set of
# trigger phrases / format markers to a routing decision: which mode of /hi to
# invoke, which agents the orchestrator should expect to dispatch, and which
# profile files to pre-read.
#
# Source of truth: this file. `.claude/commands/hi.md` references rows here
# by intent name; the prose does not duplicate trigger phrases or agent
# lists. To add or change a routing rule, edit this file and update only
# the prose pointer / per-mode procedural section in hi.md.
#
# Discoverability: Codex and other tools read this TOML directly; no helper
# subcommand. The orchestrator surfaces the matched intent inline on every
# `/hi` dispatch (see hi.md "Always-on Routing Announcement"); there is no
# opt-in flag.
#
# Schema:
#   patterns                  list of trigger phrases / format markers (case
#                             insensitive, substring-match by default; the
#                             dispatch helper treats list members as ORed)
#   mode                      string identifier of a /hi sub-mode (e.g.,
#                             "capture-fast-path", "read-and-discuss")
#   agents                    list of agent keys from harness/agents.toml
#                             that the orchestrator expects to dispatch
#                             (informational; not a hard contract)
#   profile_reads             list of filenames under profile/ that the
#                             orchestrator should pre-read before dispatch
#   priority                  int; higher = more specific, matched first.
#                             The fallback intent is priority = 0.
#   pattern                   coordination pattern (one of:
#                             "orchestrator-subagent", "generator-verifier",
#                             "agent-team", "shared-state", "solo")
#   expected_subagent_count   int hint for review tooling and dispatch-shape
#                             reasoning. 1 if a single agent; otherwise the
#                             typical-case count.
#   parallel                  bool; whether the agents dispatch in parallel
#                             (informational; the actual dispatch shape is
#                             still the orchestrator's call)
#
# Design note (per the cached "intent table is meta-harness; design for
# staleness" principle): keep the schema minimal and stable. Resist fields
# that encode current-model assumptions (e.g., model ids, token budgets,
# specific tool names). Coordination pattern is annotation; lint validates
# the value set, not behavior.
#
# No-branching contract on `pattern`: this field is documentation. No code
# path in `scripts/`, no agent prompt, and no orchestrator instruction may
# branch on its value (e.g., `if pattern == "agent-team": auto_parallelize()`).
# To add behavior keyed on coordination shape, propose a separate field with
# explicit semantics; do not extend `pattern` with new values to enable a
# runtime check. The 5-value enum is intentionally a closed set; expansion
# requires a separate wave with explicit governance.

# Capture also matches on input shape, not only literal phrases: a date-prefixed
# factual narrative without analytical question (e.g., `5/4 早上去了 X, 中午
#吃了 Y`) routes here even though no `patterns` substring matches. The
# orchestrator decides on shape via the routing prose in `.claude/commands/hi.md`
# → "Always-on Routing Announcement" / "Semantic match". Keep `patterns` for
# explicit phrases; do not add structural placeholders here.
[intents.capture]
patterns = [
    "记一下",
    "记录",
    "log this",
    "just write down",
    "just save this",
    "save this",
]
mode = "capture-fast-path"
agents = ["scribe"]
profile_reads = []
priority = 50
pattern = "solo"
expected_subagent_count = 1
parallel = false

# Reading routes to the "Read & Discuss" sub-flow (hi.md). Initial dispatch is
# Reader + Researcher; Reviewer + Challenger fire later as a write-back gate
# (not the routing announcement chain). `agents` here = the initial dispatch
# only, matching what the routing announcement claims is happening.
#
# Pattern note: do NOT add bare `"read"` here. Substring matching means a bare
# `"read"` snags compound phrases that belong to lower-priority intents:
# `"curate readwise"`, `"curate my reading"`, `"readwise triage"`, `"open
# threads"` (intents.curate, intents.explore). Use phrase-shaped variants
# (`"read this"`, `"read it"`, `"let's read"`, `"read with"`) so the reading
# intent fires on natural-language reading triggers without stealing other
# intents' phrases.
[intents.reading]
patterns = [
    "http://",
    "https://",
    "[[",
    "let's read",
    "read this",
    "read it",
    "read with",
    "discuss",
]
mode = "read-and-discuss"
agents = ["reader", "researcher"]
profile_reads = ["identity.md"]
priority = 40
pattern = "agent-team"
expected_subagent_count = 2
parallel = true

[intents.meeting]
patterns = [
    "meeting",
    "standup",
    "1:1",
    "meeting notes",
]
mode = "meeting-process"
agents = ["meeting", "challenger", "curator"]
profile_reads = []
priority = 30
pattern = "orchestrator-subagent"
expected_subagent_count = 3
parallel = false

# Talk/transcript routes to the "Read & Discuss" sub-mode of /hi (per
# .claude/commands/hi.md → "Intent Routing"), which dispatches 1 Reader
# (Critical lens, with auto-transcript preprocessing) + 1 Researcher (related
# notes) in parallel.
[intents.talk]
patterns = [
    "seminar",
    "talk",
    "transcript",
    "podcast",
    "video",
]
mode = "transcript-read"
agents = ["reader", "researcher"]
profile_reads = ["identity.md"]
priority = 20
pattern = "agent-team"
expected_subagent_count = 2
parallel = true

# Forget routes to a Forgetter decay sweep over a bounded scope. Default
# scope is $OV/drafts/ unless the user names a different path. Forgetter
# proposes; never deletes. See .claude/agents/forgetter.md.
[intents.forget]
patterns = [
    "forget",
    "decay",
    "scan for decay",
    "what should I forget",
    "clean up notes",
    "prune",
    "scan my drafts",
]
mode = "decay-scan"
agents = ["forgetter"]
profile_reads = []
priority = 25
pattern = "generator-verifier"
expected_subagent_count = 1
parallel = false

# The nine sub-mode intents below cover what used to be standalone
# slash commands (/weekly, /review, /decision, /energy-audit, /explore,
# /curate, /introspect, /lint, /promote). They remain reachable as direct
# slashes for muscle memory, and now also via `/hi <natural language>`.
# Each row points at the procedure file in `.claude/commands/<name>.md`;
# the orchestrator reads and follows that file when the intent matches.
# See `.claude/commands/hi.md` "Sub-mode procedures" for the mode → file map.

# Weekly review of the past 7 days. Procedure: .claude/commands/weekly.md.
# Higher priority than `reading` (40) so explicit "weekly" / "this week"
# beats the bare "read"/"https://" patterns when both could match.
[intents.weekly]
patterns = [
    "weekly review",
    "this week",
    "past 7 days",
    "past week",
    "weekly check-in",
    "run weekly",
]
mode = "weekly-review"
agents = ["researcher"]
profile_reads = ["identity.md", "directions.md"]
priority = 45
pattern = "orchestrator-subagent"
expected_subagent_count = 1
parallel = false

# Energy audit across physical / mental / emotional / social dimensions.
# Procedure: .claude/commands/energy-audit.md. Sits in the "Plan" cluster
# alongside review/decision; priority 43 between weekly (45) and review (42)
# so a direct phrase like "energy audit" beats the goal-review keywords.
[intents.energy-audit]
patterns = [
    "energy audit",
    "drained",
    "burnt out",
    "burned out",
    "exhausted",
    "energy check",
]
mode = "energy-audit"
agents = ["researcher"]
profile_reads = ["identity.md", "directions.md"]
priority = 43
pattern = "orchestrator-subagent"
expected_subagent_count = 1
parallel = false

# Goal review: quarterly full review or monthly light pulse. Procedure:
# .claude/commands/review.md. Patterns are deliberately specific
# ("review my goals" not bare "review") so they never collide with reading
# patterns ("read", "discuss", URLs) at priority 40.
[intents.review]
patterns = [
    "review my goals",
    "goal review",
    "check directions",
    "goal pulse",
    "goal check",
    "quarterly review",
]
mode = "goal-review"
agents = ["researcher", "synthesizer"]
profile_reads = ["identity.md", "directions.md"]
priority = 42
pattern = "orchestrator-subagent"
expected_subagent_count = 2
parallel = false

# Decision journal: structured framework cross-validation for a hard choice.
# Procedure: .claude/commands/decision.md. Researcher + Thinker fire in
# parallel (per orchestrator.md Phase 1 Gather), so pattern is agent-team.
[intents.decision]
patterns = [
    "should I",
    "help me decide",
    "help me think through",
    "torn between",
    "decision journal",
    "make a decision",
]
mode = "decision-journal"
agents = ["researcher", "thinker"]
profile_reads = ["identity.md", "directions.md"]
priority = 35
pattern = "agent-team"
expected_subagent_count = 2
parallel = true

# Open exploration: surface forgotten threads, cross-domain links, evolution
# of thinking. Procedure: .claude/commands/explore.md. Single Researcher
# dispatch on a wide net of semantic + grep + time-shifted searches.
[intents.explore]
patterns = [
    "explore",
    "wander",
    "what am I missing",
    "forgotten connections",
    "open threads",
    "what's interesting",
]
mode = "open-exploration"
agents = ["researcher"]
profile_reads = ["identity.md"]
priority = 22
pattern = "orchestrator-subagent"
expected_subagent_count = 1
parallel = false

# Curate Readwise inbox against active goals. Procedure:
# .claude/commands/curate.md. Dispatches a general-purpose ad-hoc agent
# (not a named cercle role), so `agents = []`; pattern is solo.
[intents.curate]
patterns = [
    "triage inbox",
    "curate inbox",
    "curate my reading",
    "curate readwise",
    "readwise triage",
    "score my inbox",
]
mode = "curate-inbox"
agents = []
profile_reads = ["identity.md", "directions.md"]
priority = 15
pattern = "solo"
expected_subagent_count = 1
parallel = false

# Promote L2 notes into a schema-compliant L4 wiki entry. Procedure:
# .claude/commands/promote.md. Researcher (Phase 1 candidate gather) then
# Curator (Phase 2 draft); sequential, so parallel = false.
[intents.promote]
patterns = [
    "promote to wiki",
    "promote this",
    "L4 entry",
    "canonize this",
    "create wiki entry",
    "wiki promote",
]
mode = "promote"
agents = ["researcher", "curator"]
profile_reads = []
priority = 14
pattern = "orchestrator-subagent"
expected_subagent_count = 2
parallel = false

# Wiki + harness lint suite. Procedure: .claude/commands/lint.md. Purely
# script-driven (harness_lint.py, lint.py, staleness.py, privacy_check.py,
# zk_audit.py, auto_memory_audit.py); no subagent dispatch, hence
# `agents = []` and expected_subagent_count = 0.
[intents.lint]
patterns = [
    "lint the wiki",
    "wiki audit",
    "structural checks",
    "wiki orphans",
    "run lint",
    "wiki lint",
]
mode = "lint"
agents = []
profile_reads = []
priority = 12
pattern = "solo"
expected_subagent_count = 0
parallel = false

# Build / refresh profile/ self-model from local notes. Procedure:
# .claude/commands/introspect.md. The orchestrator does most of the
# walking; agents fire as a quality gate (Reviewer + Challenger in
# parallel at Step 5), hence pattern = generator-verifier.
[intents.introspect]
patterns = [
    "introspect",
    "rebuild profile",
    "who am I",
    "self-model",
    "build my profile",
    "refresh profile",
]
mode = "introspect"
agents = ["reviewer", "challenger"]
profile_reads = []
priority = 10
pattern = "generator-verifier"
expected_subagent_count = 2
parallel = true

# Fallback: matches anything not picked up by a higher-priority intent.
# Empty patterns + priority 0 makes this the catch-all.
[intents.reflection]
patterns = []
mode = "daily-reflection"
agents = ["researcher", "challenger", "scout", "synthesizer", "reviewer"]
profile_reads = ["identity.md", "directions.md"]
priority = 0
pattern = "orchestrator-subagent"
expected_subagent_count = 5
parallel = true
