# Portable agent registry.
#
# Claude Code uses `.claude/agents/*.md` as native subagent specs.
# Codex uses this registry plus `scripts/atelier.py agents` and
# `scripts/atelier.py agent-prompt <agent>` to discover and emulate roles.
#
# Coordination patterns (the `pattern` field, per cached "Coordination
# Patterns" guidance and `protocols/orchestrator.md` → "Coordination
# Patterns"). Allowed values:
#
#   "orchestrator-subagent"  Lead orchestrator dispatches bounded subtasks.
#                            Default for most agent dispatches.
#   "generator-verifier"     Generator drafts; verifier checks the output as
#                            a gate (e.g., Reviewer + Challenger gating
#                            Curator output; privacy-reviewer dual-pair).
#   "agent-team"             Multiple persistent autonomous workers, often
#                            multi-instance and parallel (Reader hub, Scout
#                            multi-direction).
#   "shared-state"           Agents read/write a common store. Currently
#                            unused; reserved for future.
#   "solo"                   Single-agent dispatch with no coordination.
#
# `pattern` is annotation only — orchestrator dispatch behavior is governed
# by harness/models.toml `[profiles.*].invocation` (single / dual / shadow).
#
# `used_by` lists intents (`intents.<name>` from `harness/intents.toml`) and
# commands (`commands.<name>` from `harness/commands.toml`) that dispatch
# the agent. Empty `used_by` is an orphan signal (lint WARN). Keep this
# list maintained by hand; `python3 scripts/harness_lint.py --fix-used-by`
# regenerates it from the intents/commands walk.

[agents.challenger]
source = ".claude/agents/challenger.md"
model_profile = "core_intelligence"
status = "portable-adapted"
description = "Probes the painter's thoughts with sharp questions; affirms or counters in turn. Le cercle archetype: The Critic (Degas)."
codex_prompt = "Emulate the Challenger role using `.claude/agents/challenger.md` and the runtime adapter protocol."
pattern = "generator-verifier"
used_by = [
    "commands.hi",
    "commands.introspect",
    "commands.prm",
    "intents.meeting",
    "intents.reflection",
]

