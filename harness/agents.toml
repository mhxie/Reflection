# Portable agent registry.
#
# Claude Code uses `.claude/agents/*.md` as native subagent specs.
# Codex uses this registry plus `scripts/atelier.py agents` and
# `scripts/atelier.py agent-prompt <agent>` to discover and emulate roles.
#
# Each agent declares a `voices` keyed inline table mapping leg name to
# model identity. Allowed leg keys:
#
#   native  Anthropic-side leg, dispatched via Claude Code's `Agent` tool
#           (subagent_type matches the role). Uses the model declared in
#           the role's `.claude/agents/<name>.md` frontmatter `model:` field.
#   direct  OpenAI-compatible direct-api leg, dispatched via
#           `python3 scripts/chat_completion.py --model <identity>`.
#   codex   Codex CLI leg, dispatched via `codex exec -m <identity>`.
#           Reserved for the external-reviewer role today.
#
# Multi-leg roles fire all declared legs in parallel on dispatch. The
# orchestrator issues one tool call per leg in the same assistant message.
# Single-leg roles (Scribe) fire only their declared leg; this is the
# explicit carve-out for write-capable / mechanical agents where a second
# external leg would either duplicate writes or leak verbatim content.
#
# See `protocols/orchestrator.md` -> "Voice Dispatch" for the canonical
# dispatch recipe.
#
# Model identities are defined in `harness/models.toml`; provider bindings
# live in gitignored `profile/models.toml`.
#
# `dispatch_rationale` declares why this role is worth dispatching as a
# subagent rather than running inline in the orchestrator. An agent is worth
# dispatching only if (subagent input + run overhead + output) < orchestrator
# inline cost, OR it runs in parallel to accelerate wall time. Allowed values
# (a non-empty list; multiple may apply):
#
#   "context-isolation"  Agent reads large/specific files that would pollute
#                        the orchestrator's context (vault scans, transcripts,
#                        multi-file evolutions).
#   "model-tier"         Agent runs on a different model — cheaper or stronger
#                        than the orchestrator's default.
#   "parallelization"    Multiple instances run in parallel for wall-time
#                        savings (Reader hub, Scout multi-direction).
#   "tool-isolation"     Agent uses a different tool subset (write-only,
#                        scan-only) where keeping the boundary in the
#                        orchestrator would risk overreach.
#
# Lint validates each agent declares at least one rationale. An agent with
# no rationale fails lint, forcing the maintainer to either justify the
# subagent or merge the role into the orchestrator inline.
#
# `kinds` declares the domain(s) a role operates on. Allowed values:
#
#   "system"  Operates on the codebase / protocols / harness itself.
#   "app"     Operates on the user's content (notes, multimodal info,
#             reading material).
#
# A role may declare both. `kinds` is a non-empty list of these tokens.
# Lint validates the values; `scripts/atelier.py agents --kind <k>`
# filters by kind.
#
# Coordination patterns (the `pattern` field). Allowed values:
#
#   "orchestrator-subagent"  Lead orchestrator dispatches bounded subtasks.
#   "generator-verifier"     Generator drafts; verifier checks the output.
#   "agent-team"             Multiple persistent autonomous workers.
#   "shared-state"           Agents read/write a common store. Reserved.
#   "solo"                   Single-agent dispatch with no coordination.
#
# `pattern` is annotation only. No code path may branch on its value.
# Lint validates it is in the allowed set.
#
# `used_by` lists intents (`intents.<name>` from `harness/intents.toml`)
# and commands (`commands.<name>` from `harness/commands.toml`) that
# dispatch the agent. Empty `used_by` is an orphan signal (lint WARN).
# `python3 scripts/harness_lint.py --fix-used-by` regenerates from the walk.

[agents.challenger]
source = ".claude/agents/challenger.md"
voices = { native = "opus", direct = "deepseek_pro_max" }
kinds = ["app"]
dispatch_rationale = ["model-tier"]
status = "portable-adapted"
description = "Probes the painter's thoughts with sharp questions; affirms or counters in turn. Le cercle archetype: The Critic (Degas)."
codex_prompt = "Emulate the Challenger role using `.claude/agents/challenger.md` and the runtime adapter protocol."
pattern = "generator-verifier"
used_by = [
    "commands.hi",
    "commands.introspect",
    "commands.prm",
    "intents.introspect",
    "intents.meeting",
    "intents.reflection",
]

