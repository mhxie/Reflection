# Portable agent registry.
#
# Claude Code uses `.claude/agents/*.md` as native subagent specs.
# Codex uses this registry plus `scripts/atelier.py agents` and
# `scripts/atelier.py agent-prompt <agent>` to discover and emulate roles.
#
# Each agent declares its bound dual-pair `voices = ["modelA", "modelB"]`.
# Both voices run in parallel on every dispatch — duality is intrinsic to
# the role. Model identities are defined in `harness/models.toml`; provider
# bindings live in gitignored `profile/models.toml`. See
# `protocols/orchestrator.md` → "Voice Dispatch (every role is intrinsically
# dual)" for the canonical dispatch description.
#
# Coordination patterns (the `pattern` field, per `protocols/orchestrator.md`
# → "Coordination Patterns"). Allowed values:
#
#   "orchestrator-subagent"  Lead orchestrator dispatches bounded subtasks.
#                            Default for most agent dispatches.
#   "generator-verifier"     Generator drafts; verifier checks the output as
#                            a gate (e.g., Reviewer + Challenger gating
#                            Curator output; privacy-reviewer dual-pair).
#   "agent-team"             Multiple persistent autonomous workers, often
#                            multi-instance and parallel (Reader hub, Scout
#                            multi-direction).
#   "shared-state"           Agents read/write a common store. Currently
#                            unused; reserved for future.
#   "solo"                   Single-agent dispatch with no coordination.
#
# `pattern` is annotation only; it does not change the dispatch's voice
# count (every role still fires both voices in parallel via the `voices`
# field).
#
# No-branching contract: `pattern` is documentation. No code path in
# `scripts/`, no agent prompt, and no orchestrator instruction may branch on
# this field's value (e.g., `if pattern == "agent-team": auto_parallelize()`).
# To add behavior keyed on coordination shape, propose a separate field with
# explicit semantics; do not extend `pattern` with new values to enable a
# runtime check. The 5-value enum is intentionally a closed set; expansion
# requires a separate wave with explicit governance. Lint validates the value
# is in the allowed set; behavioral coupling is forbidden by convention.
#
# `used_by` lists intents (`intents.<name>` from `harness/intents.toml`) and
# commands (`commands.<name>` from `harness/commands.toml`) that dispatch
# the agent. Empty `used_by` is an orphan signal (lint WARN). Keep this
# list maintained by hand; `python3 scripts/harness_lint.py --fix-used-by`
# regenerates it from the intents/commands walk.
#
# external-reviewer is declared here for schema symmetry but is invoked
# only by `scripts/review.sh` and `/system-review` (script-driven, not via
# orchestrator agent dispatch). It has no `.claude/agents/*.md` source.

[agents.challenger]
source = ".claude/agents/challenger.md"
voices = ["opus", "deepseek_pro_max"]
status = "portable-adapted"
description = "Probes the painter's thoughts with sharp questions; affirms or counters in turn. Le cercle archetype: The Critic (Degas)."
codex_prompt = "Emulate the Challenger role using `.claude/agents/challenger.md` and the runtime adapter protocol."
pattern = "generator-verifier"
used_by = [
    "commands.hi",
    "commands.introspect",
    "commands.prm",
    "intents.introspect",
    "intents.meeting",
    "intents.reflection",
]

