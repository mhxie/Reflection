# Provider pricing catalog.
#
# Track only TWO classes per provider: flagship (top reasoning) and
# standard (everyday capable). The harness uses this catalog plus
# observed quality on `~/.cache/atelier/llm_calls/<date>.jsonl` to
# pick Pareto-optimal (performance / cost) models for each tier.
# When the same provider exposes more than two classes, pick the
# representative pair; ultra-cheap or ultra-niche variants live in
# `notes` rather than as additional rows.
#
# Prices in USD per 1M tokens. Re-verify when `verified_at` is
# older than ~30 days, when a provider announces a price change,
# or when a promotional discount expires.
#
# Schema (per [providers.<id>]):
#   verified_at           ISO date the prices were last confirmed
#   long_context_premium  false | "<threshold> -> <multiplier>x"
#                         (e.g., "200K -> 2x" for Gemini)
#
# Schema (per [providers.<id>.flagship] and [providers.<id>.standard]):
#   model           provider's own model id (matches direct_api binding)
#   input           per-1M-token input price (USD)
#   output          per-1M-token output price (USD)
#   cache_hit       per-1M-token price for cache-hit input (USD)
#   context_window  max input tokens (approx)
#   notes           free-text caveats, discounts, tokenizer quirks
#
# Blended cost = (3*input + 1*output) / 4
# Assumes the 3:1 input:output token ratio observed in agent
# workloads. Used by `scripts/pricing.py` for ranking and cost
# estimation against the invocation log.

[providers.anthropic]
verified_at = "2026-05-03"
long_context_premium = false

[providers.anthropic.flagship]
model = "claude-opus-4-7"
input = 5.00
output = 25.00
cache_hit = 0.50
context_window = 1000000
notes = "tokenizer uses up to 35% more tokens; effective blended ~$13.50"

[providers.anthropic.standard]
model = "claude-sonnet-4-6"
